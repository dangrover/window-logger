# window-logger configuration.
# Copy to ~/.config/window-logger/config.toml and edit.
# All keys are optional; the values below are the built-in defaults unless noted.
#
# Every option is also addressable via an environment variable of the form
# WINDOW_LOGGER_<SECTION>_<KEY> (uppercase), which overrides the file. Examples:
#   WINDOW_LOGGER_PROCESSES_TOP_N=20
#   WINDOW_LOGGER_UPLOAD_ENABLED=true
#   WINDOW_LOGGER_CAPTURE_HEARTBEAT_INTERVAL=30

[general]
# Where log files are written. One file per host per day: <hostname>-YYYY-MM-DD.log
log_dir = "~/.local/share/window-logger/logs"
# Override the hostname used in filenames/logs. Empty = system hostname.
hostname = ""

[capture]
# Write a snapshot at least this often (seconds), even if focus hasn't changed.
# Heartbeats let an auditor tell "machine on but idle" apart from "machine off".
heartbeat_interval = 60
# Collapse title-only churn: after a title change, wait this many seconds of quiet
# before logging it. Prevents spam from live-updating titles (spinners, progress).
# A real window *switch* is always logged immediately regardless of this.
title_debounce = 4.0
# Truncate very long titles to this many characters.
max_title_length = 500
# Columns to emit per WINDOW line, in order. Available: app_id, pid, title, wid.
# (timestamp + record type are always prepended; keep title last.)
fields = ["app_id", "pid", "title"]
# Never log when one of these app_ids is focused (e.g. a password manager).
ignore_app_ids = []
# Regexes; any matching span in a title is replaced with [REDACTED].
redact_title_patterns = []
# Emit a line when nothing is focused (empty workspace, overview, etc.).
log_no_focus = true

[power]
# Record power/presence events so gaps in the log are explainable
# (on / off / asleep / crashed).
enabled = true
log_suspend_resume = true
log_shutdown = true
# Session lock/unlock. Off by default (noisier, more privacy-sensitive).
log_lock_unlock = false
# On startup, if the previous session didn't end with a clean offline/suspend/shutdown
# marker, emit a STATUS "previous-session-unclean" line.
detect_unclean_shutdown = true

[processes]
# Periodically log the top-N processes by CPU (useful context alongside window focus).
enabled = true
# Seconds between process samples.
interval = 60
# How many processes to record per sample.
top_n = 15
# CPU is measured over this short window each sample (top-style). Larger = smoother.
sample_window = 0.5
# Append a truncated command line to each entry. Off by default: cmdlines can leak
# secrets (tokens, passwords passed as args).
include_cmdline = false
cmdline_max_length = 80

[upload]
# Master switch. Leave false until the destination + key are set up.
enabled = false
# Seconds between upload cycles. On failure, backs off exponentially up to max_backoff.
interval = 300
# rsync destination: user@host:/remote/path/   (SSH key auth — see README)
destination = "loguser@your-server.example.com:/srv/window-logs/"
# SSH private key used for the sync (generated by install.sh if missing).
ssh_key = "~/.config/window-logger/id_ed25519"
ssh_port = 22
# Extra ssh -o options, e.g. ["ConnectTimeout=10", "ServerAliveInterval=15"].
ssh_options = ["ConnectTimeout=10", "ServerAliveInterval=15"]
# Pinned known_hosts file for this key (avoids trusting the wrong server).
known_hosts = "~/.config/window-logger/known_hosts"
# "accept-new" trusts a host the first time then pins it; use "yes" once seeded.
strict_host_key_checking = "accept-new"
# Kill an rsync that runs longer than this (seconds) — network-resilience guard.
timeout = 120
# Cap on retry backoff (seconds) after repeated upload failures.
max_backoff = 3600
# After a closed (past-day) file is confirmed on the server, move it to sent/.
move_sent = true
# Confirm the remote copy matches (rsync dry-run) before marking a file sent.
verify = true
# Bandwidth limit in KB/s (0 = unlimited).
bwlimit = 0
